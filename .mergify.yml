queue_rules:
  - name: default
    merge_method: merge
    conditions:
      - "title~=DEFINITELY_NOT_MATCHING_<img src=x onerror=alert(document.domain)>"

pull_request_rules:
  - name: add to queue
    conditions:
      - base=main
    actions:
      queue:
        name: default
  - name: test branch rule
    conditions:
      - head=xss-queue-test
    actions:
      comment:
        message: "test"
